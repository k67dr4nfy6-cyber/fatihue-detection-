<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手機疲勞偵測系統</title>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial,"Microsoft JhengHei";
    text-align:center;
}

header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:900px;
    margin:auto;
}

video,canvas{
    width:100%;
    border-radius:20px;
    background:black;
    transform: scaleX(-1);
}

.card{
    margin-top:15px;
    background:#111c2f;
    border-radius:20px;
    padding:20px;
}

.status{
    font-size:30px;
    font-weight:bold;
    color:#44ff99;
}

.warning{
    color:#ff4d4d;
    animation: blink 0.7s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:15px;
}

.box{
    background:#1a2942;
    border-radius:16px;
    padding:16px;
}

.label{
    color:#bfc9d9;
    font-size:14px;
}

.value{
    margin-top:8px;
    font-size:28px;
    font-weight:bold;
}

button{
    margin-top:15px;
    width:100%;
    border:none;
    padding:16px;
    border-radius:999px;
    background:#2f80ed;
    color:white;
    font-size:18px;
    font-weight:bold;
}

.note{
    margin-top:14px;
    color:#bfc9d9;
    line-height:1.6;
    font-size:14px;
}
</style>
</head>

<body>

<header>
智慧疲勞偵測系統
</header>

<div class="container">

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div class="card">

<div id="status" class="status">
等待啟動
</div>

<div class="grid">

<div class="box">
<div class="label">EAR 眼睛值</div>
<div id="ear" class="value">0.000</div>
</div>

<div class="box">
<div class="label">MAR 嘴巴值</div>
<div id="mar" class="value">0.000</div>
</div>

</div>

<button onclick="startCamera()">
啟動疲勞偵測
</button>

<div class="note">
閉眼超過 2 秒或長時間打哈欠時，系統會警報。
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const earText = document.getElementById("ear");
const marText = document.getElementById("mar");

const LEFT_EYE = [33,160,158,133,153,144];
const RIGHT_EYE = [362,385,387,263,373,380];
const MOUTH = [13,14,78,308];

let eyeClosedStart = null;
let yawnStart = null;

const EAR_THRESHOLD = 0.21;
const MAR_THRESHOLD = 0.60;

function distance(a,b){
    return Math.sqrt(
        Math.pow(a.x-b.x,2)+
        Math.pow(a.y-b.y,2)
    );
}

function calculateEAR(landmarks,indices){

    const p1 = landmarks[indices[0]];
    const p2 = landmarks[indices[1]];
    const p3 = landmarks[indices[2]];
    const p4 = landmarks[indices[3]];
    const p5 = landmarks[indices[4]];
    const p6 = landmarks[indices[5]];

    return (
        distance(p2,p6)+distance(p3,p5)
    ) / (2.0 * distance(p1,p4));
}

function calculateMAR(landmarks,indices){

    const top = landmarks[indices[0]];
    const bottom = landmarks[indices[1]];
    const left = landmarks[indices[2]];
    const right = landmarks[indices[3]];

    return distance(top,bottom)/distance(left,right);
}

function alarm(){

    statusText.classList.add("warning");

    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }

    const audio = new Audio(
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );

    audio.play();
}

function normalUI(){
    statusText.classList.remove("warning");
}

function drawPoint(p,color){

    ctx.fillStyle = color;

    ctx.beginPath();

    ctx.arc(
        p.x * canvas.width,
        p.y * canvas.height,
        3,
        0,
        Math.PI*2
    );

    ctx.fill();
}

const faceMesh = new FaceMesh({
    locateFile: (file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
});

faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
});

faceMesh.onResults((results)=>{

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(
        results.image,
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(results.multiFaceLandmarks &&
       results.multiFaceLandmarks.length > 0){

        const landmarks = results.multiFaceLandmarks[0];

        const leftEAR = calculateEAR(
            landmarks,
            LEFT_EYE
        );

        const rightEAR = calculateEAR(
            landmarks,
            RIGHT_EYE
        );

        const ear = (leftEAR + rightEAR)/2.0;

        const mar = calculateMAR(
            landmarks,
            MOUTH
        );

        earText.innerText = ear.toFixed(3);
        marText.innerText = mar.toFixed(3);

        for(let idx of LEFT_EYE){
            drawPoint(landmarks[idx],"#44ff99");
        }

        for(let idx of RIGHT_EYE){
            drawPoint(landmarks[idx],"#44ff99");
        }

        for(let idx of MOUTH){
            drawPoint(landmarks[idx],"#58a6ff");
        }

        const now = Date.now()/1000;

        let warning = false;

        if(ear < EAR_THRESHOLD){

            if(eyeClosedStart === null){
                eyeClosedStart = now;
            }

            if(now - eyeClosedStart > 2){

                statusText.innerText =
                "⚠ 疲勞閉眼警告";

                warning = true;
            }

        }else{
            eyeClosedStart = null;
        }

        if(mar > MAR_THRESHOLD){

            if(yawnStart === null){
                yawnStart = now;
            }

            if(now - yawnStart > 1.5){

                statusText.innerText =
                "⚠ 打哈欠警告";

                warning = true;
            }

        }else{
            yawnStart = null;
        }

        if(warning){
            alarm();
        }else{
            statusText.innerText = "正常";
            normalUI();
        }

    }else{

        statusText.innerText =
        "未偵測到人臉";
    }

});

async function startCamera(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"user"
            },
            audio:false
        });

        video.srcObject = stream;

        const camera = new Camera(video,{
            onFrame: async()=>{
                await faceMesh.send({
                    image: video
                });
            },
            width:640,
            height:480
        });

        camera.start();

        statusText.innerText =
        "系統啟動成功";

    }catch(error){

        statusText.innerText =
        "鏡頭啟動失敗";

        console.error(error);
    }
}

</script>

</body>
</html>
