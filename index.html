<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<title>智慧疲勞偵測系統 Pro+</title>

<style>
:root{
  --bg:#07111f;
  --card:#101b2d;
  --box:#1b2a44;
  --text:#fff;
  --muted:#bfc9d9;
  --ok:#44ff99;
  --warn:#ff4d4d;
  --blue:#2f80ed;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  text-align:center;
  transition:0.3s;
}

header{
  padding:18px 12px 10px;
  font-size:24px;
  font-weight:900;
}

.container{
  width:94%;
  max-width:920px;
  margin:auto;
  padding-bottom:30px;
}

.cameraBox{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  background:black;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
}

video,
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}

canvas{
  pointer-events:none;
}

.topBadge{
  position:absolute;
  left:12px;
  top:12px;
  background:rgba(0,0,0,.55);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
  border:1px solid rgba(255,255,255,.15);
}

.card{
  margin-top:14px;
  background:var(--card);
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.status{
  font-size:32px;
  font-weight:900;
  color:var(--ok);
}

.warning{
  color:var(--warn);
  animation:blink .7s infinite;
}

@keyframes blink{
  50%{
    opacity:.3;
  }
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.box{
  background:var(--box);
  border-radius:18px;
  padding:16px;
}

.label{
  color:var(--muted);
  font-size:14px;
}

.value{
  margin-top:8px;
  font-size:30px;
  font-weight:900;
}

button{
  width:100%;
  margin-top:14px;
  border:none;
  border-radius:999px;
  padding:16px;
  font-size:18px;
  font-weight:900;
  color:white;
  background:var(--blue);
}

button.secondary{
  background:#33445e;
}

.log{
  margin-top:12px;
  background:#0b1424;
  border-radius:14px;
  padding:12px;
  font-size:13px;
  color:var(--muted);
  text-align:left;
  max-height:140px;
  overflow:auto;
}

.progressWrap{
  margin-top:16px;
  background:#1b2a44;
  border-radius:18px;
  padding:12px;
}

.progressBar{
  margin-top:10px;
  height:18px;
  background:#0b1424;
  border-radius:999px;
  overflow:hidden;
}

.progressFill{
  height:100%;
  width:0%;
  transition:.3s;
}

.eventLog{
  margin-top:12px;
  max-height:180px;
  overflow:auto;
  text-align:left;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
智慧疲勞偵測系統 Pro+
</header>

<div class="container">

  <div class="cameraBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="topBadge" id="badge">
      待機中
    </div>
  </div>

  <div class="card">

    <div class="status" id="status">
      等待啟動
    </div>

    <div class="grid">
      <div class="box">
        <div class="label">EAR 眼睛值</div>
        <div class="value" id="ear">0.000</div>
      </div>

      <div class="box">
        <div class="label">MAR 嘴巴值</div>
        <div class="value" id="mar">0.000</div>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <div class="label">危險閉眼時間</div>
        <div class="value" id="eyeTime">0.0s</div>
      </div>

      <div class="box">
        <div class="label">打哈欠時間</div>
        <div class="value" id="yawnTime">0.0s</div>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <div class="label">危險閉眼次數</div>
        <div class="value" id="blinkCount">0</div>
      </div>

      <div class="box">
        <div class="label">哈欠次數</div>
        <div class="value" id="yawnCount">0</div>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <div class="label">FPS</div>
        <div class="value" id="fps">0</div>
      </div>

      <div class="box">
        <div class="label">EAR 基準值</div>
        <div class="value" id="baselineEar">--</div>
      </div>
    </div>

    <button onclick="startSystem()">
      啟動疲勞偵測
    </button>

    <button class="secondary" onclick="stopSystem()">
      停止系統
    </button>

    <div class="progressWrap">
      <div>
        疲勞指數：
        <span id="fatigueScore">0</span>%
      </div>

      <div class="progressBar">
        <div class="progressFill" id="fatigueFill"></div>
      </div>

      <div id="fatigueLevel">
        😀 清醒
      </div>
    </div>

    <div class="log" id="log">
      系統訊息：尚未啟動
    </div>

    <div class="eventLog" id="eventLog">
      事件紀錄：
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const earText = document.getElementById("ear");
const marText = document.getElementById("mar");
const eyeTimeText = document.getElementById("eyeTime");
const yawnTimeText = document.getElementById("yawnTime");

const blinkCountEl = document.getElementById("blinkCount");
const yawnCountEl = document.getElementById("yawnCount");

const fatigueScoreEl = document.getElementById("fatigueScore");
const fatigueFill = document.getElementById("fatigueFill");
const fatigueLevel = document.getElementById("fatigueLevel");

const baselineEarEl = document.getElementById("baselineEar");
const fpsEl = document.getElementById("fps");

const badge = document.getElementById("badge");
const logBox = document.getElementById("log");
const eventLog = document.getElementById("eventLog");

const LEFT_EYE = [33,160,158,133,153,144];
const RIGHT_EYE = [362,385,387,263,373,380];
const MOUTH = [13,14,78,308];

let stream = null;
let running = false;
let faceMesh = null;

let processing = false;

let lastFrame = performance.now();

let audioContext = null;
let oscillator = null;
let gainNode = null;

let eyeClosedStart = null;
let yawnStart = null;

let blinkFlag = false;
let yawnFlag = false;

let blinkCount = 0;
let yawnCount = 0;

let fatigueScore = 0;

let calibration = [];
let baselineEAR = null;

let EAR_THRESHOLD = 0.22;
let MAR_THRESHOLD = 0.50;

let lastEventTime = Date.now();

function log(msg){
  logBox.innerText = "系統訊息：" + msg;
}

function addEvent(msg){
  const t = new Date().toLocaleTimeString();

  eventLog.innerHTML =
    "<div>" + t + " - " + msg + "</div>"
    + eventLog.innerHTML;
}

function distance(a,b){
  return Math.sqrt(
    (a.x-b.x)**2 +
    (a.y-b.y)**2
  );
}

function calculateEAR(landmarks, idx){

  const p1 = landmarks[idx[0]];
  const p2 = landmarks[idx[1]];
  const p3 = landmarks[idx[2]];
  const p4 = landmarks[idx[3]];
  const p5 = landmarks[idx[4]];
  const p6 = landmarks[idx[5]];

  return (
    distance(p2,p6)+distance(p3,p5)
  ) / (2 * distance(p1,p4));
}

function calculateMAR(landmarks, idx){

  return distance(
    landmarks[idx[0]],
    landmarks[idx[1]]
  ) / distance(
    landmarks[idx[2]],
    landmarks[idx[3]]
  );
}

function drawPoint(p,color){

  ctx.fillStyle = color;

  ctx.beginPath();

  ctx.arc(
    p.x * canvas.width,
    p.y * canvas.height,
    3,
    0,
    Math.PI*2
  );

  ctx.fill();
}

function prepareAudio(){

  if(!audioContext){
    audioContext =
      new(window.AudioContext ||
      window.webkitAudioContext)();
  }

  if(audioContext.state === "suspended"){
    audioContext.resume();
  }
}

function startAlarm(){

  prepareAudio();

  if(oscillator) return;

  gainNode = audioContext.createGain();
  oscillator = audioContext.createOscillator();

  oscillator.type = "triangle";
  oscillator.frequency.value = 988;

  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);

  gainNode.gain.value = 0.08;

  oscillator.start();

  oscillator.intervalId = setInterval(()=>{

    if(!gainNode) return;

    const t = audioContext.currentTime;

    gainNode.gain.setValueAtTime(0.08,t);

    gainNode.gain.linearRampToValueAtTime(
      0,
      t+0.35
    );

  },1000);

  if(navigator.vibrate){
    navigator.vibrate([300,150,300]);
  }
}

function stopAlarm(){

  if(oscillator){

    clearInterval(oscillator.intervalId);

    try{
      oscillator.stop();
      oscillator.disconnect();
    }catch(e){}

    oscillator = null;
    gainNode = null;
  }
}

function setStatus(text,warning=false){

  statusText.innerText = text;

  if(warning){

    statusText.classList.add("warning");

    badge.innerText = "警示中";

    document.body.style.background =
      "#1a0710";

  }else{

    statusText.classList.remove("warning");

    badge.innerText =
      running ? "偵測中" : "待機中";

    document.body.style.background =
      "#07111f";
  }
}

function updateFatigueUI(){

  fatigueScoreEl.innerText = fatigueScore;

  fatigueFill.style.width =
    fatigueScore + "%";

  if(fatigueScore < 30){

    fatigueFill.style.background =
      "#44ff99";

    fatigueLevel.innerText =
      "😀 清醒";

  }else if(fatigueScore < 60){

    fatigueFill.style.background =
      "#ffcc00";

    fatigueLevel.innerText =
      "😐 注意";

  }else if(fatigueScore < 80){

    fatigueFill.style.background =
      "#ff8800";

    fatigueLevel.innerText =
      "😴 疲勞";

  }else{

    fatigueFill.style.background =
      "#ff4d4d";

    fatigueLevel.innerText =
      "🚨 危險";
  }
}

async function initFaceMesh(){

  log("正在載入模型...");

  faceMesh = new FaceMesh({
    locateFile:(file)=>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:false,
    minDetectionConfidence:0.4,
    minTrackingConfidence:0.4
  });

  faceMesh.onResults(onResults);

  if(faceMesh.initialize){
    await faceMesh.initialize();
  }

  log("模型載入完成");
}

function resizeCanvas(){

  canvas.width =
    video.videoWidth || 640;

  canvas.height =
    video.videoHeight || 480;
}

function onResults(results){

  if(!running) return;

  resizeCanvas();

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  if(
    !results.multiFaceLandmarks ||
    results.multiFaceLandmarks.length===0
  ){

    setStatus("未偵測到人臉");

    stopAlarm();

    return;
  }

  const landmarks =
    results.multiFaceLandmarks[0];

  const leftEAR =
    calculateEAR(
      landmarks,
      LEFT_EYE
    );

  const rightEAR =
    calculateEAR(
      landmarks,
      RIGHT_EYE
    );

  const ear =
    (leftEAR + rightEAR)/2;

  const mar =
    calculateMAR(
      landmarks,
      MOUTH
    );

  if(
    !baselineEAR &&
    calibration.length < 50
  ){

    calibration.push(ear);

    baselineEarEl.innerText =
      `校正中 ${Math.round(
        calibration.length/50*100
      )}%`;

  }

  if(
    !baselineEAR &&
    calibration.length === 50
  ){

    baselineEAR =
      calibration.reduce((a,b)=>a+b,0)
      / calibration.length;

    EAR_THRESHOLD =
      Math.max(
        0.18,
        Math.min(
          baselineEAR * 0.72,
          0.32
        )
      );

    baselineEarEl.innerText =
      baselineEAR.toFixed(3);

    addEvent("EAR 校正完成");
  }

  earText.innerText =
    ear.toFixed(3);

  marText.innerText =
    mar.toFixed(3);

  for(let i of LEFT_EYE){
    drawPoint(
      landmarks[i],
      "#44ff99"
    );
  }

  for(let i of RIGHT_EYE){
    drawPoint(
      landmarks[i],
      "#44ff99"
    );
  }

  for(let i of MOUTH){
    drawPoint(
      landmarks[i],
      "#58a6ff"
    );
  }

  const now =
    Date.now()/1000;

  if(ear < EAR_THRESHOLD){

    if(eyeClosedStart===null){
      eyeClosedStart = now;
    }

  }else{
    eyeClosedStart = null;
  }

  if(mar > MAR_THRESHOLD){

    if(yawnStart===null){
      yawnStart = now;
    }

  }else{
    yawnStart = null;
  }

  const eyeDuration =
    eyeClosedStart===null
    ? 0
    : now-eyeClosedStart;

  const yawnDuration =
    yawnStart===null
    ? 0
    : now-yawnStart;

  eyeTimeText.innerText =
    eyeDuration.toFixed(1)+"s";

  yawnTimeText.innerText =
    yawnDuration.toFixed(1)+"s";

  let warning = false;

  if(eyeDuration >= 2){

    warning = true;

    if(!blinkFlag){

      blinkFlag = true;

      blinkCount++;

      fatigueScore =
        Math.min(
          100,
          fatigueScore + 15
        );

      lastEventTime =
        Date.now();

      addEvent("危險閉眼");
    }

  }

  if(eyeDuration < 0.3){
    blinkFlag = false;
  }

  if(yawnDuration >= 1.5){

    warning = true;

    if(!yawnFlag){

      yawnFlag = true;

      yawnCount++;

      fatigueScore =
        Math.min(
          100,
          fatigueScore + 20
        );

      lastEventTime =
        Date.now();

      addEvent("打哈欠");
    }
  }

  if(yawnDuration < 0.3){
    yawnFlag = false;
  }

  blinkCountEl.innerText =
    blinkCount;

  yawnCountEl.innerText =
    yawnCount;

  updateFatigueUI();

  if(warning){

    setStatus(
      "⚠ 疲勞警告",
      true
    );

    startAlarm();

  }else{

    setStatus(
      "正常運作中",
      false
    );

    stopAlarm();
  }

  const nowF =
    performance.now();

  fpsEl.innerText =
    Math.round(
      1000 / (nowF-lastFrame)
    );

  lastFrame = nowF;
}

async function processLoop(){

  if(!running) return;

  if(processing){

    requestAnimationFrame(
      processLoop
    );

    return;
  }

  processing = true;

  try{

    await faceMesh.send({
      image:video
    });

  }catch(e){

    console.error(e);

    log(
      "模型執行異常：" +
      e.message
    );
  }

  processing = false;

  setTimeout(()=>{

    requestAnimationFrame(
      processLoop
    );

  },120);
}

async function startSystem(){

  try{

    prepareAudio();

    if(!faceMesh){
      await initFaceMesh();
    }

    stream =
      await navigator.mediaDevices
      .getUserMedia({

      video:{
        facingMode:"user",
        width:{ideal:640},
        height:{ideal:480},
        frameRate:{
          ideal:24,
          max:24
        }
      },

      audio:false
    });

    video.srcObject = stream;

    await video.play();

    running = true;

    setStatus(
      "系統運作中"
    );

    processLoop();

  }catch(error){

    setStatus(
      "啟動失敗",
      true
    );

    log(error.message);
  }
}

function stopSystem(){

  running = false;

  stopAlarm();

  if(stream){

    stream
      .getTracks()
      .forEach(
        t=>t.stop()
      );

    stream = null;
  }

  if(faceMesh){

    faceMesh.close();

    faceMesh = null;
  }

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  setStatus("已停止");

  badge.innerText = "待機中";

  log("系統已停止");

  calibration = [];
  baselineEAR = null;

  baselineEarEl.innerText = "--";
}

document.addEventListener(
  "visibilitychange",
  ()=>{

  if(
    audioContext &&
    audioContext.state==="suspended"
  ){

    audioContext.resume();
  }
});

setInterval(()=>{

  if(
    running &&
    fatigueScore > 0 &&
    Date.now()-lastEventTime > 8000
  ){

    fatigueScore =
      Math.max(
        0,
        fatigueScore-2
      );

    updateFatigueUI();
  }

},3000);

</script>

</body>
</html>
