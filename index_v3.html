<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧疲勞偵測系統 V3</title>

<style>
body{
  margin:0;
  background:#07111f;
  color:white;
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  text-align:center;
}
header{
  padding:18px;
  font-size:23px;
  font-weight:bold;
}
.container{
  width:94%;
  max-width:900px;
  margin:auto;
}
.cameraBox{
  position:relative;
  width:100%;
  background:black;
  border-radius:20px;
  overflow:hidden;
  aspect-ratio:3/4;
}
video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
  pointer-events:none;
}
.card{
  margin-top:14px;
  background:#111c2f;
  border-radius:20px;
  padding:18px;
}
.status{
  font-size:28px;
  font-weight:bold;
  color:#44ff99;
}
.warning{
  color:#ff4d4d;
  animation:blink .7s infinite;
}
@keyframes blink{
  50%{opacity:.35;}
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
.box{
  background:#1a2942;
  border-radius:16px;
  padding:15px;
}
.label{
  color:#bfc9d9;
  font-size:14px;
}
.value{
  margin-top:8px;
  font-size:27px;
  font-weight:bold;
}
button{
  margin-top:15px;
  width:100%;
  border:none;
  padding:16px;
  border-radius:999px;
  background:#2f80ed;
  color:white;
  font-size:18px;
  font-weight:bold;
}
button.secondary{
  background:#34435c;
}
.note{
  margin-top:13px;
  color:#bfc9d9;
  line-height:1.6;
  font-size:14px;
}
.log{
  margin-top:12px;
  padding:12px;
  background:#0b1424;
  border-radius:14px;
  color:#bfc9d9;
  font-size:13px;
  line-height:1.6;
  text-align:left;
}
</style>
</head>

<body>
<header>智慧疲勞偵測系統 V3</header>

<div class="container">

  <div class="cameraBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="card">
    <div id="status" class="status">等待啟動</div>

    <div class="grid">
      <div class="box">
        <div class="label">EAR 眼睛值</div>
        <div id="ear" class="value">0.000</div>
      </div>

      <div class="box">
        <div class="label">MAR 嘴巴值</div>
        <div id="mar" class="value">0.000</div>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <div class="label">閉眼累積</div>
        <div id="eyeTime" class="value">0.0s</div>
      </div>

      <div class="box">
        <div class="label">打哈欠累積</div>
        <div id="yawnTime" class="value">0.0s</div>
      </div>
    </div>

    <button onclick="startSystem()">啟動疲勞偵測</button>
    <button class="secondary" onclick="stopSystem()">停止</button>

    <div class="note">
      V3 已修正：鏡頭畫面與特徵點會疊在同一個畫面，不會上下出現兩個畫面。
    </div>

    <div id="log" class="log">系統訊息：尚未啟動。</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const earText = document.getElementById("ear");
const marText = document.getElementById("mar");
const eyeTimeText = document.getElementById("eyeTime");
const yawnTimeText = document.getElementById("yawnTime");
const logBox = document.getElementById("log");

const LEFT_EYE = [33,160,158,133,153,144];
const RIGHT_EYE = [362,385,387,263,373,380];
const MOUTH = [13,14,78,308];

let EAR_THRESHOLD = 0.25;
let MAR_THRESHOLD = 0.50;

let eyeClosedStart = null;
let yawnStart = null;
let running = false;
let stream = null;
let faceMesh = null;
let alarmAudio = null;
let lastProcess = 0;

function log(msg){
  logBox.innerText = "系統訊息：" + msg;
}

function distance(a,b){
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}

function calculateEAR(landmarks,indices){
  const p1 = landmarks[indices[0]];
  const p2 = landmarks[indices[1]];
  const p3 = landmarks[indices[2]];
  const p4 = landmarks[indices[3]];
  const p5 = landmarks[indices[4]];
  const p6 = landmarks[indices[5]];
  return (distance(p2,p6)+distance(p3,p5))/(2.0*distance(p1,p4));
}

function calculateMAR(landmarks,indices){
  const top = landmarks[indices[0]];
  const bottom = landmarks[indices[1]];
  const left = landmarks[indices[2]];
  const right = landmarks[indices[3]];
  return distance(top,bottom)/distance(left,right);
}

function drawPoint(p,color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(p.x*canvas.width,p.y*canvas.height,4,0,Math.PI*2);
  ctx.fill();
}

function startAlarm(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200,100,200]);
  }

  if(!alarmAudio){
    alarmAudio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    alarmAudio.loop = true;
  }

  alarmAudio.play().catch(()=>{});
}

function stopAlarm(){
  if(alarmAudio){
    alarmAudio.pause();
    alarmAudio.currentTime = 0;
  }
}

function setStatus(text, warning=false){
  statusText.innerText = text;
  if(warning){
    statusText.classList.add("warning");
  }else{
    statusText.classList.remove("warning");
  }
}

async function initFaceMesh(){
  log("正在載入 MediaPipe 模型，請稍等 5～10 秒。");

  faceMesh = new FaceMesh({
    locateFile: (file)=>{
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
  });

  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:0.3,
    minTrackingConfidence:0.3
  });

  faceMesh.onResults(onResults);

  if(faceMesh.initialize){
    await faceMesh.initialize();
  }

  log("MediaPipe 載入完成，準備開啟鏡頭。");
}

function resizeCanvas(){
  const rect = video.getBoundingClientRect();
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
}

function onResults(results){
  if(!running) return;

  resizeCanvas();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0){
    const landmarks = results.multiFaceLandmarks[0];

    const leftEAR = calculateEAR(landmarks,LEFT_EYE);
    const rightEAR = calculateEAR(landmarks,RIGHT_EYE);
    const ear = (leftEAR + rightEAR)/2.0;
    const mar = calculateMAR(landmarks,MOUTH);

    earText.innerText = ear.toFixed(3);
    marText.innerText = mar.toFixed(3);

    for(let i of LEFT_EYE) drawPoint(landmarks[i],"#44ff99");
    for(let i of RIGHT_EYE) drawPoint(landmarks[i],"#44ff99");
    for(let i of MOUTH) drawPoint(landmarks[i],"#58a6ff");

    const now = Date.now()/1000;
    let warning = false;
    let status = "正常";

    if(ear < EAR_THRESHOLD){
      if(eyeClosedStart === null) eyeClosedStart = now;
    }else{
      eyeClosedStart = null;
    }

    if(mar > MAR_THRESHOLD){
      if(yawnStart === null) yawnStart = now;
    }else{
      yawnStart = null;
    }

    const eyeDuration = eyeClosedStart === null ? 0 : now - eyeClosedStart;
    const yawnDuration = yawnStart === null ? 0 : now - yawnStart;

    eyeTimeText.innerText = eyeDuration.toFixed(1) + "s";
    yawnTimeText.innerText = yawnDuration.toFixed(1) + "s";

    if(eyeDuration >= 2.0){
      status = "⚠ 疲勞閉眼警告";
      warning = true;
    }

    if(yawnDuration >= 1.5){
      status = "⚠ 打哈欠警告";
      warning = true;
    }

    setStatus(status,warning);

    if(warning){
      startAlarm();
    }else{
      stopAlarm();
    }

    log("已偵測到人臉，EAR/MAR 正常更新中。");

  }else{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    earText.innerText = "0.000";
    marText.innerText = "0.000";
    eyeTimeText.innerText = "0.0s";
    yawnTimeText.innerText = "0.0s";
    setStatus("未偵測到人臉",false);
    stopAlarm();
    log("鏡頭已開啟，但尚未偵測到人臉。請正對鏡頭、靠近一點、保持光線充足。");
  }
}

async function processLoop(){
  if(!running) return;

  const now = performance.now();

  if(video.readyState >= 2 && now - lastProcess > 120){
    lastProcess = now;
    try{
      await faceMesh.send({image: video});
    }catch(e){
      log("MediaPipe 執行錯誤：" + e.message);
    }
  }

  requestAnimationFrame(processLoop);
}

async function startSystem(){
  try{
    setStatus("系統啟動中",false);

    if(!faceMesh){
      await initFaceMesh();
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:"user",
        width:{ideal:640},
        height:{ideal:480}
      },
      audio:false
    });

    video.srcObject = stream;
    await video.play();

    running = true;
    log("鏡頭啟動成功。請將臉部放在畫面中央。");
    setStatus("系統運作中",false);

    processLoop();

  }catch(error){
    running = false;
    setStatus("鏡頭或模型啟動失敗",true);
    log("錯誤：" + error.message + "。請確認使用 Safari、HTTPS 網址、並允許相機權限。");
  }
}

function stopSystem(){
  running = false;
  stopAlarm();

  if(stream){
    stream.getTracks().forEach(track=>track.stop());
    stream = null;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  setStatus("已停止",false);
  log("系統已停止。");
}
</script>

</body>
</html>
